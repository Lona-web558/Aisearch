<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Search Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style1.css">

</head>
<body>

<div class="scanlines"></div>

<div class="container">

  <header class="app-header">
    <span class="dot dot-cyan"></span>
    <h1>AI Search Engine</h1>
    <span class="tag">v1.0</span>
  </header>

  <div class="terminal-shell">
    <div class="terminal-titlebar">
      <span class="tb-dot tb-red"></span>
      <span class="tb-dot tb-yellow"></span>
      <span class="tb-dot tb-green"></span>
      <span class="tb-label">search — ai-engine</span>
    </div>

    <div class="terminal-body">
      <div class="prompt-line">
        <span class="prompt-prefix">root@search:~$</span>
        <input
          id="searchBox"
          class="prompt-input"
          placeholder="query the web..."
          autocomplete="off"
          onkeydown="if(event.key==='Enter'){search();}">
        <span class="caret"></span>
      </div>

      <button class="btn-run" onclick="search()">
        Run search
      </button>

      <div id="results" class="results"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
